<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacker Messenger - Login</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="hacker-theme">
    <div class="auth-container">
        <div class="glitch-wrapper">
            <h1 class="glitch" data-text="HACKER_MESSENGER">HACKER_MESSENGER</h1>
        </div>
        <form id="loginForm" class="auth-form">
            <div class="input-group">
                <label for="username">USER_ID</label>
                <input type="text" id="username" placeholder="Enter Username" required>
            </div>
            <div class="input-group">
                <label for="password">ACCESS_CODE</label>
                <input type="password" id="password" placeholder="Enter Password" required>
                <div id="loginError" class="error-msg"></div>
            </div>
            <button type="submit" class="neon-btn">INITIALIZE_SESSION</button>
            <p class="auth-switch">No access? <a href="/register.html">REQUEST_CREDENTIALS</a></p>
        </form>
    </div>
    <script src="/js/auth.js"></script>
</body>
</html>
