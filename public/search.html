<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search - Hacker Messenger</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="hacker-theme">
    <div class="app-container">
        <header class="top-bar">
            <button class="icon-btn" onclick="location.href='/index.html'"><i data-lucide="arrow-left"></i></button>
            <input type="text" id="searchInput" placeholder="SEARCH_USER_ID..." style="flex: 1; background: transparent; border: none; border-bottom: 1px solid var(--neon-green); color: var(--neon-green); margin: 0 15px; outline: none; font-family: var(--font-mono);">
            <button class="icon-btn" id="doSearch"><i data-lucide="search"></i></button>
        </header>

        <main class="main-content" id="searchResults">
            <!-- Results will be loaded here -->
        </main>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/search.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
