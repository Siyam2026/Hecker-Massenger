<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Hacker Messenger</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="hacker-theme">
    <div class="chat-container">
        <header class="chat-header">
            <button class="icon-btn" onclick="location.href='/index.html'"><i data-lucide="arrow-left"></i></button>
            <img id="chatUserPic" src="" class="profile-pic" style="width: 40px; height: 40px; margin: 0 10px;">
            <div class="chat-user-info">
                <div id="chatUserName" class="neon-text">LOADING...</div>
                <div id="chatUserStatus" style="font-size: 0.6rem; opacity: 0.7;">OFFLINE</div>
            </div>
            <div style="margin-left: auto;">
                <button class="icon-btn" id="callBtn"><i data-lucide="phone"></i></button>
            </div>
        </header>

        <div class="messages-area" id="messagesArea">
            <!-- Messages will appear here -->
        </div>

        <div id="typingIndicator" style="padding: 5px 20px; font-size: 0.7rem; display: none;">User is typing...</div>

        <div class="chat-input-area">
            <input type="file" id="fileInput" multiple style="display: none;">
            <button class="icon-btn" onclick="document.getElementById('fileInput').click()"><i data-lucide="plus"></i></button>
            <input type="text" id="messageInput" placeholder="Type a message...">
            <button class="icon-btn" id="emojiBtn"><i data-lucide="smile"></i></button>
            <button class="icon-btn" id="sendBtn"><i data-lucide="send"></i></button>
            <button class="icon-btn" id="voiceBtn"><i data-lucide="mic"></i></button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/offline.js"></script>
    <script src="/js/chat.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
